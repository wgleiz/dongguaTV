name: Android Build & Release

on:
  push:
    tags:
      - 'v*.*.*'  # 只在推送版本标签时触发
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Server URL (e.g. https://your-site.com)'
        required: true
        default: 'http://192.168.50.254:3600'
      app_name:
        description: 'App Name'
        required: true
        default: 'WGleiz-TV'
      version_tag:
        description: 'Version Tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm install

      # 保险措施：创建 www 目录并复制 public 内容 (防止 CLI 回退默认 www 时报错)
      - name: Prepare Web Assets
        run: |
          mkdir -p www
          if [ -d "public" ]; then
            cp -r public/* www/
          else
            echo "<html><body>E视界</body></html>" > www/index.html
          fi
          echo "Created www directory manually as fallback"

      # 仅在手动触发时修改配置
      - name: Configure App (Manual Build)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "📝 Applying manual configuration..."
          
          # 1. 修改 capacitor.config.json (server URL + appName)
          tmp=$(mktemp)
          jq --arg url "${{ inputs.server_url }}" --arg name "${{ inputs.app_name }}" \
             '.server.url = $url | .appName = $name' capacitor.config.json > "$tmp" && mv "$tmp" capacitor.config.json
          
          # 2. 修改 Android 原生文件 (capacitor sync 不会传播这些字段)
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          GRADLE_FILE="android/app/build.gradle"
          APP_NAME="${{ inputs.app_name }}"
          VERSION_TAG="${{ inputs.version_tag }}"
          
          # 2a. 更新 strings.xml 中的 app_name 和 title_activity_main
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${APP_NAME}</string>|" "$STRINGS_FILE"
          sed -i "s|<string name=\"title_activity_main\">.*</string>|<string name=\"title_activity_main\">${APP_NAME}</string>|" "$STRINGS_FILE"
          
          # 2b. 从 version_tag 提取版本号 (去掉 v 前缀, 如 v1.2.3 -> 1.2.3)
          VERSION_NAME="${VERSION_TAG#v}"
          # 计算 versionCode: major*10000 + minor*100 + patch (如 1.2.3 -> 10203)
          VERSION_CODE=$(echo "$VERSION_NAME" | awk -F. '{printf "%d", ($1*10000 + $2*100 + $3)}')
          # 如果解析失败则使用默认值 1
          [ "$VERSION_CODE" -eq 0 ] 2>/dev/null && VERSION_CODE=1
          
          sed -i "s|versionCode [0-9]*|versionCode $VERSION_CODE|" "$GRADLE_FILE"
          sed -i "s|versionName \".*\"|versionName \"$VERSION_NAME\"|" "$GRADLE_FILE"
          
          echo "✅ Configuration updated:"
          echo "   App Name: ${APP_NAME}"
          echo "   Server URL: ${{ inputs.server_url }}"
          echo "   Version: ${VERSION_NAME} (code: ${VERSION_CODE})"
          echo ""
          echo "=== strings.xml ==="
          cat "$STRINGS_FILE"
          echo ""
          echo "=== build.gradle (version lines) ==="
          grep -E "versionCode|versionName" "$GRADLE_FILE"

      # 显示当前 Capacitor 配置
      - name: Show Capacitor Config
        run: |
          echo "=== Capacitor Config ==="
          cat capacitor.config.json

      # Tag 触发时也更新版本号 (workflow_dispatch 已在上一步处理)
      - name: Update Version from Tag
        if: ${{ github.event_name == 'push' }}
        run: |
          GRADLE_FILE="android/app/build.gradle"
          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${VERSION_TAG#v}"
          VERSION_CODE=$(echo "$VERSION_NAME" | awk -F. '{printf "%d", ($1*10000 + $2*100 + $3)}')
          [ "$VERSION_CODE" -eq 0 ] 2>/dev/null && VERSION_CODE=1
          
          sed -i "s|versionCode [0-9]*|versionCode $VERSION_CODE|" "$GRADLE_FILE"
          sed -i "s|versionName \".*\"|versionName \"$VERSION_NAME\"|" "$GRADLE_FILE"
          
          echo "✅ Version updated from tag: ${VERSION_NAME} (code: ${VERSION_CODE})"
      # 从网站图标生成 Android App 图标（各分辨率）
      - name: Generate App Icons from Website Icon
        run: |
          # 安装 ImageMagick
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # 源图标
          ICON_SRC="public/icon.png"
          
          # 生成各分辨率图标
          # mipmap-mdpi: 48x48 (Icon: 36x36)
          convert "$ICON_SRC" -resize 36x36 -background none -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$ICON_SRC" -resize 36x36 -background none -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert "$ICON_SRC" -resize 72x72 -background none -gravity center -extent 108x108 android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          
          # mipmap-hdpi: 72x72 (Icon: 54x54)
          convert "$ICON_SRC" -resize 54x54 -background none -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$ICON_SRC" -resize 54x54 -background none -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert "$ICON_SRC" -resize 108x108 -background none -gravity center -extent 162x162 android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          
          # mipmap-xhdpi: 96x96 (Icon: 72x72)
          convert "$ICON_SRC" -resize 72x72 -background none -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$ICON_SRC" -resize 72x72 -background none -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert "$ICON_SRC" -resize 144x144 -background none -gravity center -extent 216x216 android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          
          # mipmap-xxhdpi: 144x144 (Icon: 108x108)
          convert "$ICON_SRC" -resize 108x108 -background none -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$ICON_SRC" -resize 108x108 -background none -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert "$ICON_SRC" -resize 216x216 -background none -gravity center -extent 324x324 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          
          # mipmap-xxxhdpi: 192x192 (Icon: 144x144)
          convert "$ICON_SRC" -resize 144x144 -background none -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert "$ICON_SRC" -resize 144x144 -background none -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          convert "$ICON_SRC" -resize 288x288 -background none -gravity center -extent 432x432 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          
          echo "✅ App icons generated from website icon"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK (Universal - All Architectures)
        working-directory: android
        run: ./gradlew assembleRelease

      # 签名 APK
      # 优先使用 GitHub Secrets 配置的 Release 密钥
      # 如果未配置，自动生成并使用临时 Debug 密钥签名
      - name: Sign APK
        run: |
          # 查找 Build Tools (优先使用较新版本)
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign"
          
          echo "Using Build Tools: $BUILD_TOOLS_VERSION"
          
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          
          # 1. 密钥准备
          KEYSTORE_FILE="release.keystore"
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "🔐 Using Release Key from Secrets"
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > $KEYSTORE_FILE
            STORE_PASS="${{ secrets.KEY_STORE_PASSWORD }}"
            KEY_ALIAS="${{ secrets.ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            echo "⚠️ No Secrets found. Generating Debug Key for signing..."
            # 生成临时 Debug 密钥 (Java 21 兼容格式)
            keytool -genkeypair -v \
              -keystore $KEYSTORE_FILE \
              -storetype PKCS12 \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            
            STORE_PASS="android"
            KEY_ALIAS="androiddebugkey"
            KEY_PASS="android"
          fi
          
          # 2. Zipalign 对齐 (签名可以通过，但 Release 包通常建议先对齐)
          echo "📏 Aligning APK..."
          $ZIPALIGN -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          
          # 3. 签名
          echo "✍️ Signing APK..."
          $APKSIGNER sign \
            --ks "$KEYSTORE_FILE" \
            --ks-pass pass:"$STORE_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEY_PASS" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          
          # 清理
          rm "$UNSIGNED_APK" "$ALIGNED_APK" "$KEYSTORE_FILE"
          
          echo "✅ APK Signed successfully!"

      - name: List APK files
        run: |
          echo "=== APK Files ==="
          find android -name "*.apk" -type f
          echo "=== APK Details ==="
          ls -lh android/app/build/outputs/apk/release/ || echo "No release APKs found"

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version_tag }}" >> $GITHUB_OUTPUT
            echo "Using manual version: ${{ inputs.version_tag }}"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "Using tag version: ${GITHUB_REF#refs/tags/}"
          fi

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/E视界-${{ steps.version.outputs.VERSION }}-universal.apk || \
          echo "APK rename skipped"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E视界-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "E视界 ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📦 E视界 ${{ steps.version.outputs.VERSION }}
            
            ### 📱 Android APK 下载
            
            | 文件 | 说明 |
            |------|------|
            | `E视界-${{ steps.version.outputs.VERSION }}-universal.apk` | 通用版 (支持所有设备) |
            
            ### 🖥️ 支持的 CPU 架构
            - ✅ `armeabi-v7a` (ARM 32位 - 旧手机/盒子)
            - ✅ `arm64-v8a` (ARM 64位 - 大多数现代手机/盒子)
            - ✅ `x86` (Intel/AMD 32位 - 模拟器)
            - ✅ `x86_64` (Intel/AMD 64位 - 模拟器/部分平板)
            
            ### 📺 设备兼容性
            - ✅ 手机 (Android 5.0+)
            - ✅ 平板
            - 📺 电视/盒子: 推荐使用电视浏览器访问网页版，兼容性更佳
            
            ### 🌐 内置服务器
            - 默认连接: `${{ github.event.inputs.server_url || 'https://ednovas.video' }}`
            
            ---
            
            > ⚠️ 首次安装可能需要允许"安装未知来源应用"
          files: android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
